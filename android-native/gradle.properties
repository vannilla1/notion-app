# JVM memory nastavenia — Android Gradle Plugin 8.x vyžaduje aspoň 2 GB heap.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# AndroidX je povinné (staré Support Library je dávno deprecated).
android.useAndroidX=true

# Non-transitive R classes — zmenšuje build output, Google odporúča pre nové projekty.
android.nonTransitiveRClass=true

# Kotlin code style (nič praktické, len aby nerobil varovania).
kotlin.code.style=official
