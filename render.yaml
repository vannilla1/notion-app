services:
  # Backend API
  - type: web
    name: prpl-crm-api
    runtime: node
    region: frankfurt
    rootDir: server
    buildCommand: npm ci --omit=dev
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: SENTRY_DSN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false

  # Frontend
  - type: web
    name: prpl-crm
    runtime: static
    region: frankfurt
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      # Apple Universal Links association file has NO extension — we must force
      # application/json Content-Type so iOS accepts it during app-install
      # association fetch. Also must not be cached longer than 1 day.
      - path: /.well-known/apple-app-site-association
        name: Content-Type
        value: application/json
      - path: /.well-known/apple-app-site-association
        name: Cache-Control
        value: public, max-age=86400
      # Android Digital Asset Links — already served with the right extension,
      # but an explicit Cache-Control keeps the verification fast on install.
      - path: /.well-known/assetlinks.json
        name: Cache-Control
        value: public, max-age=86400
    routes:
      # Pre-rendered statické stránky pre Google OAuth verification
      # (reviewer + Googlebot vidia plný text policy/VOP bez JS).
      # MUSIA ísť PRED catch-all, lebo Render spracováva routes zhora dolu.
      - type: rewrite
        source: /ochrana-udajov
        destination: /ochrana-udajov.html
      - type: rewrite
        source: /vop
        destination: /vop.html
      # SPA fallback pre všetky ostatné routes (React Router zaberie).
      # NOTE: /.well-known/* physical files are served BEFORE this rewrite by
      # Render's static-first resolution, so assetlinks + apple-app-site-association
      # are not swallowed by the SPA fallback.
      - type: rewrite
        source: /*
        destination: /index.html
