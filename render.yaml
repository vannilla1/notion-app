services:
  # Backend API
  - type: web
    name: prpl-crm-api
    runtime: node
    region: frankfurt
    rootDir: server
    buildCommand: npm ci --omit=dev
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: SENTRY_DSN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false

  # Frontend
  - type: web
    name: prpl-crm
    runtime: static
    region: frankfurt
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      # Pre-rendered statické stránky pre Google OAuth verification
      # (reviewer + Googlebot vidia plný text policy/VOP bez JS).
      # MUSIA ísť PRED catch-all, lebo Render spracováva routes zhora dolu.
      - type: rewrite
        source: /ochrana-udajov
        destination: /ochrana-udajov.html
      - type: rewrite
        source: /vop
        destination: /vop.html
      # SPA fallback pre všetky ostatné routes (React Router zaberie).
      - type: rewrite
        source: /*
        destination: /index.html
