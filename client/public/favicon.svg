<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Orbital ring -->
  <ellipse cx="32" cy="32" rx="22" ry="22" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Orbital dots -->
  <circle cx="32" cy="10" r="1.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="54" cy="32" r="1.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="32" cy="54" r="1.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="10" cy="32" r="1.5" fill="rgba(255,255,255,0.6)"/>
  <!-- Small sparkle dots -->
  <circle cx="50" cy="14" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="14" cy="50" r="1" fill="rgba(255,255,255,0.4)"/>
  <!-- Letter P -->
  <text x="32" y="43" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="32" fill="white">P</text>
</svg>
