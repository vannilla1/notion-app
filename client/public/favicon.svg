<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b6af0"/>
      <stop offset="40%" stop-color="#7c5ce6"/>
      <stop offset="100%" stop-color="#a855d8"/>
    </linearGradient>
    <!-- Subtle radial glow behind the P -->
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Center glow -->
  <circle cx="32" cy="32" r="26" fill="url(#glow)"/>

  <!-- Dotted orbital ring -->
  <circle cx="32" cy="32" r="23" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.8" stroke-dasharray="2.2,2.8"/>

  <!-- Sparkle stars (4-point) at cardinal + diagonal positions -->
  <!-- Top -->
  <path d="M32 8 L32.6 9.8 L34 10 L32.6 10.2 L32 12 L31.4 10.2 L30 10 L31.4 9.8Z" fill="rgba(255,255,255,0.9)"/>
  <!-- Right -->
  <path d="M54 32 L54.6 33.8 L56 34 L54.6 34.2 L54 36 L53.4 34.2 L52 34 L53.4 33.8Z" fill="rgba(255,255,255,0.7)"/>
  <!-- Bottom -->
  <path d="M32 52 L32.6 53.8 L34 54 L32.6 54.2 L32 56 L31.4 54.2 L30 54 L31.4 53.8Z" fill="rgba(255,255,255,0.8)"/>
  <!-- Left -->
  <path d="M8 30 L8.6 31.8 L10 32 L8.6 32.2 L8 34 L7.4 32.2 L6 32 L7.4 31.8Z" fill="rgba(255,255,255,0.7)"/>

  <!-- Diagonal sparkles (smaller) -->
  <path d="M49 13 L49.4 14.2 L50.5 14.5 L49.4 14.8 L49 16 L48.6 14.8 L47.5 14.5 L48.6 14.2Z" fill="rgba(255,255,255,0.6)"/>
  <path d="M51 22 L51.3 22.8 L52 23 L51.3 23.2 L51 24 L50.7 23.2 L50 23 L50.7 22.8Z" fill="rgba(255,255,255,0.5)"/>
  <path d="M14 48 L14.3 48.8 L15 49 L14.3 49.2 L14 50 L13.7 49.2 L13 49 L13.7 48.8Z" fill="rgba(255,255,255,0.5)"/>

  <!-- Glow dots on the orbital ring -->
  <circle cx="32" cy="9" r="1.8" fill="rgba(255,255,255,0.8)"/>
  <circle cx="55" cy="32" r="1.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="32" cy="55" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="9" cy="32" r="1.5" fill="rgba(255,255,255,0.6)"/>
  <!-- Extra glow dots between cardinal points -->
  <circle cx="47" cy="14" r="1.2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="14" cy="47" r="1.2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="48" cy="48" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="16" cy="16" r="1" fill="rgba(255,255,255,0.4)"/>

  <!-- Letter P -->
  <text x="32" y="43" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="700" font-size="30" fill="white" letter-spacing="-0.5">P</text>
</svg>
